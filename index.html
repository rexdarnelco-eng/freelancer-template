<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rex darnel | Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #22d3ee; border-radius: 10px; }
        html { scroll-behavior: smooth; }

        body {
            background-color: #0b1120;
            background-image: url("https://www.transparenttextures.com/patterns/carbon-fibre.png");
            background-attachment: fixed;
            color: white;
            font-family: sans-serif;
        }

        .glass-ui { 
            background: rgba(30, 41, 59, 0.55);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .gradient-text {
            background: linear-gradient(to right, #22d3ee, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Animations */
        .fade-in {
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.8s ease-out;
        }
        .fade-in.show {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>

<nav class="glass-ui sticky top-0 z-50 p-6 flex justify-between items-center border-b border-white/5">
    <div class="text-2xl font-black uppercase tracking-tight">
        Free<span class="text-cyan-400">lancer.</span>
    </div>
    <a href="#contact" class="bg-cyan-500 hover:bg-cyan-400 text-slate-900 px-6 py-2.5 rounded-full font-bold transition transform hover:scale-105">
        Hire Me
    </a>
</nav>

<header class="py-28 px-6 text-center max-w-5xl mx-auto fade-in">
    <span class="inline-block px-4 py-1.5 mb-6 text-xs font-bold tracking-widest text-cyan-400 uppercase bg-cyan-400/10 border border-cyan-400/20 rounded-full">
        Available for Work
    </span>
    <h1 class="text-5xl md:text-7xl font-black mb-6 leading-tight">Rex darnel</h1>
    <p class="gradient-text text-xl font-bold mb-6">Web Developer | Web Designer | UIX | Video Editor | Writing</p>
</header>

<section id="projects" class="py-24 px-6 max-w-6xl mx-auto fade-in">
    <h2 class="text-4xl font-bold mb-12">Projects</h2>
    <div class="grid md:grid-cols-3 gap-6">
        <div onclick="openModal('Project One', 'Detailed description of your first premium project.', 'https://picsum.photos/500/300', 'https://example.com')" 
             class="glass-ui p-6 rounded-2xl cursor-pointer hover:scale-[1.03] transition">
            <h3 class="font-bold text-lg text-cyan-400">Project One</h3>
            <p class="text-slate-400 text-sm">Tap to view details</p>
        </div>
        </div>
</section>

<section id="contact" class="py-24 px-6 fade-in text-center">
    <div class="max-w-3xl mx-auto glass-ui p-10 rounded-3xl">
        <h2 class="text-3xl font-bold mb-4">Get In Touch</h2>
        <a href="mailto:your@email.com" class="bg-cyan-500 text-slate-900 px-8 py-4 rounded-xl font-bold hover:bg-cyan-400 transition inline-block">Send Email</a>
    </div>
</section>

<div id="projectModal" class="fixed inset-0 bg-black/90 hidden flex items-center justify-center z-[100] opacity-0 transition-opacity duration-300" onclick="closeModal()">
    <div id="modalBox" class="bg-[#0b1120] p-8 rounded-3xl max-w-[90%] w-[450px] text-center relative border border-white/10 scale-95 opacity-0 transition-all duration-300" onclick="event.stopPropagation()">
        <img id="modalImage" class="rounded-2xl mb-6 w-full aspect-video object-cover" src="" alt="Project Preview">
        <h2 id="modalTitle" class="text-3xl font-bold mb-3 gradient-text"></h2>
        <p id="modalDesc" class="text-slate-400 mb-8"></p>
        
        <div class="flex flex-col gap-3">
            <a id="modalLink" href="#" target="_blank" class="bg-cyan-500 text-slate-900 px-8 py-3 rounded-xl font-bold hover:bg-cyan-400 transition inline-block">
                View Project
            </a>
            <button onclick="closeModal()" class="text-sm text-slate-500 hover:text-white mt-2">Close Preview</button>
        </div>
    </div>
</div>

<script>
    // Fade-in Observer
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if(entry.isIntersecting) entry.target.classList.add('show');
        });
    }, { threshold: 0.1 });
    document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));

    // Modal Functions
    function openModal(title, desc, image, link) {
        const modal = document.getElementById('projectModal');
        const box = document.getElementById('modalBox');
        
        document.getElementById('modalTitle').innerText = title;
        document.getElementById('modalDesc').innerText = desc;
        document.getElementById('modalImage').src = image;
        document.getElementById('modalLink').href = link; // This sets the button link

        modal.classList.remove('hidden');
        setTimeout(() => {
            modal.classList.add('opacity-100');
            box.classList.remove('scale-95', 'opacity-0');
            box.classList.add('scale-100', 'opacity-100');
        }, 10);
    }

    function closeModal() {
        const modal = document.getElementById('projectModal');
        modal.classList.remove('opacity-100');
        setTimeout(() => modal.classList.add('hidden'), 300);
    }
</script>
</body>
</html>
