<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Freelancer Portfolio | Template</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Force these styles to show up */
        ::-webkit-scrollbar { width: 6px !important; }
        ::-webkit-scrollbar-track { background: #0f172a !important; }
        ::-webkit-scrollbar-thumb { background: #22d3ee !important; border-radius: 10px !important; }
        
        .glass-effect { 
            background: rgba(30, 41, 59, 0.5) !important; 
            backdrop-filter: blur(12px) !important; 
            -webkit-backdrop-filter: blur(12px) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important; 
        }
        html { scroll-behavior: smooth; }
    </style>
</head>
<body class="bg-[#0f172a] text-white font-sans">

    <nav class="glass-effect sticky top-0 z-50 p-6 flex justify-between items-center">
        <div class="text-2xl font-bold tracking-tighter text-white">FREE<span class="text-cyan-400">LANCE.</span></div>
        <a href="#contact" class="bg-cyan-500 text-slate-900 px-5 py-2 rounded-full font-bold">Hire Me</a>
    </nav>

    <header class="py-24 px-6 text-center">
        <h1 class="text-5xl md:text-7xl font-extrabold mb-6">I build <span class="text-cyan-400">digital experiences.</span></h1>
        <p class="text-slate-400 text-lg max-w-2xl mx-auto mb-10">Helping brands scale with custom web solutions and UI/UX design.</p>
    </header>

    <section id="work" class="py-20 px-6 max-w-6xl mx-auto">
        <h2 class="text-3xl font-bold mb-12 border-l-4 border-cyan-400 pl-4">Services</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="glass-effect p-8 rounded-3xl shadow-2xl">
                <div class="text-cyan-400 text-4xl mb-4">✦</div>
                <h3 class="text-xl font-bold mb-2">Web Development</h3>
                <p class="text-slate-400">Clean, performant code built with a mobile-first approach.</p>
            </div>
            </div>
    </section>

</body>
</html>
