<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Freelancer Portfolio Template</title>

<script>
tailwind.config = {
  darkMode: 'class'
}
</script>

<script src="https://cdn.tailwindcss.com"></script>

<style>
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: #0f172a; }
::-webkit-scrollbar-thumb { background: #22d3ee; border-radius: 10px; }

html { scroll-behavior: smooth; }

.glass-ui { 
  background: rgba(30, 41, 59, 0.55);
  backdrop-filter: blur(16px);
  border: 1px solid rgba(255,255,255,0.1);
}

.gradient-text {
  background: linear-gradient(to right, #22d3ee, #3b82f6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.fade-in {
  opacity: 0;
  transform: translateY(20px);
  transition: all 0.8s ease;
}

.fade-in.show {
  opacity: 1;
  transform: translateY(0);
}
</style>

</head>

<body class="bg-white dark:bg-[#0b1120] text-slate-900 dark:text-white font-sans transition-colors duration-300">

<!-- NAV -->
<nav class="glass-ui sticky top-0 z-50 p-6 flex justify-between items-center">

<div class="text-2xl font-black uppercase">
Free<span class="text-cyan-400">lancer.</span>
</div>

<div class="flex items-center gap-3">

<a href="#contact" class="bg-cyan-500 text-slate-900 px-6 py-2 rounded-full font-bold hover:bg-cyan-400">
Hire Me
</a>

<button onclick="toggleTheme()" 
class="px-4 py-2 rounded-lg bg-slate-200 dark:bg-white/10 text-slate-900 dark:text-white">
🌙
</button>

</div>
</nav>

<!-- HERO -->
<header class="py-28 px-6 text-center max-w-5xl mx-auto fade-in">

<h1 class="text-5xl md:text-7xl font-black mb-6">
I Help Clients Build <br>
<span class="gradient-text">Stunning Digital Experiences</span>
</h1>

<p class="text-slate-500 dark:text-slate-400 mb-10">
Freelancer • Designer • Developer • Creator
</p>

</header>

<!-- PROJECTS -->
<section id="projects" class="py-24 px-6 max-w-6xl mx-auto fade-in">

<h2 class="text-4xl font-bold mb-12">Projects</h2>

<div class="grid md:grid-cols-3 gap-6">

<div onclick="openModal('Project One','Premium project description','https://picsum.photos/500/300','https://example.com')" 
class="glass-ui p-6 rounded-2xl cursor-pointer hover:scale-105 active:scale-95 transition">

<h3 class="font-bold">Project One</h3>
<p class="text-slate-400 text-sm">Short description</p>

</div>

</div>

</section>

<!-- MODAL -->
<div id="projectModal"
class="fixed inset-0 bg-black/70 hidden items-center justify-center z-50 opacity-0 transition duration-300"
onclick="closeModal(event)">

<div id="modalBox"
class="bg-white dark:bg-[#0b1120] p-6 rounded-2xl max-w-md w-full text-center scale-90 opacity-0 transition duration-300"
onclick="event.stopPropagation()">

<img id="modalImage" class="rounded-xl mb-4 w-full h-40 object-cover">

<h2 id="modalTitle" class="text-2xl font-bold mb-2"></h2>

<p id="modalDesc" class="text-slate-500 dark:text-slate-400 mb-6"></p>

<a id="modalLink" target="_blank"
class="bg-cyan-500 text-slate-900 px-6 py-2 rounded-lg font-bold">
View Live
</a>

<button onclick="closeModal(event)" class="block mt-3 text-sm text-slate-400">
Close
</button>

</div>
</div>

<!-- SCRIPTS -->
<script>
const observer = new IntersectionObserver(entries => {
entries.forEach(entry => {
if(entry.isIntersecting){
entry.target.classList.add('show');
}
});
});

document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
</script>

<script>
function openModal(title, desc, image, link) {
const modal = document.getElementById('projectModal');
const box = document.getElementById('modalBox');

modal.classList.remove('hidden');
modal.classList.add('flex');

setTimeout(() => {
modal.classList.remove('opacity-0');
modal.classList.add('opacity-100');

box.classList.remove('scale-90','opacity-0');
box.classList.add('scale-100','opacity-100');
}, 10);

document.getElementById('modalTitle').innerText = title;
document.getElementById('modalDesc').innerText = desc;
document.getElementById('modalImage').src = image;
document.getElementById('modalLink').href = link;
}

function closeModal() {
const modal = document.getElementById('projectModal');
const box = document.getElementById('modalBox');

box.classList.remove('scale-100','opacity-100');
box.classList.add('scale-90','opacity-0');

modal.classList.remove('opacity-100');
modal.classList.add('opacity-0');

setTimeout(() => {
modal.classList.add('hidden');
modal.classList.remove('flex');
}, 300);
}
</script>

<script>
function toggleTheme() {
document.documentElement.classList.toggle('dark');

localStorage.setItem(
'theme',
document.documentElement.classList.contains('dark') ? 'dark' : 'light'
);
}

if (localStorage.getItem('theme') === 'dark') {
document.documentElement.classList.add('dark');
}
</script>

</body>
</html>
