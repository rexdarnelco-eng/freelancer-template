<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <title>Glass UI Template</title>
    <style>
        /* Custom Styles */
        .gradient-text {
            background: linear-gradient(90deg, rgba(255,0,150,1) 0%, rgba(0,204,255,1) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 10px;
            padding: 1rem;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }
        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }
    </style>
</head>
<body class="bg-gray-100">
    <header class="glass fade-in">
        <h1 class="text-4xl text-center font-bold gradient-text">Welcome to Our Service</h1>
    </header>
    <section id="services" class="glass fade-in">
        <h2 class="text-2xl font-bold">Services</h2>
        <ul class="list-disc list-inside">
            <li>Web Development</li>
            <li>Graphic Design</li>
            <li>SEO Optimization</li>
        </ul>
    </section>
    <section id="projects" class="glass fade-in">
        <h2 class="text-2xl font-bold">Projects</h2>
        <div class="modal fade-in">
            <button class="bg-blue-500 text-white p-2 rounded" onclick="openModal()">View Projects</button>
            <div id="projectModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center">
                <div class="bg-white p-5 rounded shadow">
                    <h3>Your Projects</h3>
                    <button onclick="closeModal()">Close</button>
                </div>
            </div>
        </div>
    </section>
    <section id="contact" class="glass fade-in">
        <h2 class="text-2xl font-bold">Contact Us</h2>
        <form>
            <input type="text" placeholder="Your Name" class="p-2 rounded border"><br>
            <input type="email" placeholder="Your Email" class="p-2 rounded border"><br>
            <textarea placeholder="Your Message" class="p-2 rounded border"></textarea><br>
            <button type="submit" class="bg-blue-500 text-white p-2 rounded">Send</button>
        </form>
    </section>
    <footer class="glass fade-in">
        <p>&copy; 2023 Your Company</p>
    </footer>
    <script>
        function openModal() {
            document.getElementById('projectModal').classList.remove('hidden');
        }
        function closeModal() {
            document.getElementById('projectModal').classList.add('hidden');
        }
    </script>
</body>
</html>
