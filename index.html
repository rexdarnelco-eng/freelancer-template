<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freelancer Portfolio</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
    <style>
        /* Minimal clean design for freelancer portfolios */
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background: #f4f4f4;
            color: #333;
        }
        .section {
            padding: 60px 0;
            text-align: center;
        }
        .section.fade-in {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s ease-out, transform 0.6s ease-out;
        }
        .section.fade-in.visible {
            opacity: 1;
            transform: translateY(0);
        }
        /* Hover effects */
        .hover-effect {
            transition: box-shadow 0.3s ease, transform 0.3s ease;
        }
        .hover-effect:hover {
            box-shadow: 0 4px 20px rgba(255, 255, 255, 0.6);
            transform: scale(1.05);
        }
        /* Improved modal styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0, 0, 0, 0.7);
            transition: opacity 0.5s ease;
        }
        .modal-content {
            background-color: #fff;
            margin: 15% auto;
            padding: 20px;
            border: 1px solid #888;
            width: 80%;
            border-radius: 8px;
        }
        /* JavaScript animated sections */
        .parallax {
            /* any parallax background image style */
        }
    </style>
</head>
<body>
    <header>
        <h1>My Freelancer Portfolio</h1>
    </header>
    <section class="section fade-in" id="about-me">
        <h2>About Me</h2>
        <p>Enhancing the portfolio experience with animations and interactivity!</p>
    </section>
    <section class="section fade-in hover-effect" id="projects">
        <h2>Projects</h2>
        <p>Here are some of my highlighted works!</p>
    </section>
    <footer class="fade-in">
        <p>&copy; 2026 Freelancer Portfolio. All Rights Reserved.</p>
    </footer>
    <script>
        // Scroll-triggered animations
        const sections = document.querySelectorAll('.fade-in');
        const observer = new IntersectionObserver(entries => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                    observer.unobserve(entry.target);
                }
            });
        });
        sections.forEach(section => {
            observer.observe(section);
        });
        // Modal functionality
        function openModal() {
            document.querySelector('.modal').style.display = 'block';
        }
        function closeModal() {
            document.querySelector('.modal').style.display = 'none';
        }
    </script>
</body>
</html>
